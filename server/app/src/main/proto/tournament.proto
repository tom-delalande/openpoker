syntax = "proto3";

package openpoker.v1;

import "google/protobuf/empty.proto";

service TournamentService {
  rpc Status(google.protobuf.Empty) returns (stream TournamentEvent);
  rpc Create(CreateTournamentRequest) returns (TournamentResponse);
  rpc Update(UpdateTournamentRequest) returns (TournamentResponse);
}

message CreateTournamentRequest {

}

message UpdateTournamentRequest {

}


message TournamentResponse {

}

message TournamentEvent {
  oneof kind {
    Created created = 1;
    Updated updated = 2;
  }

  message Created {
    int32 id = 1;
  }

  message Updated {
    int32 id = 1;
  }
}